<!doctype html>
<html>
  <head>
    <title>Figure 4-14: Layout</title>
    <style>
      #header {
        background-color: #ff8c8c;
        border: 1px solid black;
        padding: 5px;
        margin: 5px;
        text-align: center;
      }

      #navbar {
        background-color: #00e0ff;
        height: 200px;
        width: 20%;
        float: left;
        border: 1px solid black;
        padding: 5px;
        margin: 5px;
        text-align: left;
      }

      div#navbar ul {
        list-style-type: none;
        padding-left: 0;
      }

      #content {
        background-color: #eeeeee;
        height: 200px;
        width: 74%;
        float: left;
        border: 1px solid black;
        padding: 5px;
        margin: 5px;
        text-align: center;
      }

      #footer {
        clear: both;
        text-align: center;
        padding: 10px;
        margin: 5px;
      }
    </style>
  </head>
  <body>
    <div id="header"><h1>Nik's Tapas Restaurant</h1></div>

    <div id="navbar">
      <ul>
        <li>About us</li>
        <li>Reservations</li>
        <li>Menus</li>
        <li>Gallery</li>
        <li>Events</li>
        <li>Catering</li>
        <li>Press</li>
      </ul>
    </div>

    <div id="content">
      <img src="images/tapas.png" width="100%" alt="Nik's Tapas" />
    </div>

    <div id="footer">Copyright &copy; Nik's Tapas</div>
  </body>
</html>
