<!doctype html>
<html>
  <head>
    <title>The order property</title>
    <style>
      #gallery {
        display: flex;
      }
      .box {
        border: 4px solid black;
        margin: 10px;
        font-size: 36px;
        width: 100px;
        height: 100px;
      }
    </style>
  </head>
  <body>
    <div id="gallery">
      <div class="box" style="order: 2">1</div>
      <div class="box" style="order: 3">2</div>
      <div class="box" style="order: 1">3</div>
    </div>
  </body>
</html>
