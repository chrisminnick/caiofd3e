<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Title and Hidden Attributes</title>
  </head>
  <body>
    <h1>Web Development</h1>
    <p title="HyperText Markup Language">
      Hover over <abbr>HTML</abbr> to see more info
    </p>
    <p>This page has a secret message.</p>
    <p hidden>You found it! But browsers won't display this.</p>
  </body>
</html>
