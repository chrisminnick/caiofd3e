<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Superscript and Subscript Example</title>
  </head>
  <body>
    <p>
      The University of Pennsylvania announced to the public the first
      electronic general-purpose computer, named ENIAC, on February 14,
      1946.<sup>1</sup>
    </p>
    <p>
      The Centers for Disease Control and Prevention recommends drinking several
      glasses of H<sub>2</sub>O per day.
    </p>
  </body>
</html>
